<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudBox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Custom smooth fade-in effect for file cards */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Custom scrollbar for better UI */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 text-gray-800 font-sans h-screen flex overflow-hidden">
    
    <div id="sidebar" class="w-64 bg-gradient-to-b from-indigo-900 to-purple-800 text-white shadow-2xl transition-all duration-300 flex flex-col z-20 relative">
        <div class="p-6">
            <h1 class="text-3xl font-extrabold mb-8 tracking-tight flex items-center gap-2">CloudBox <span class="text-2xl">📦</span></h1>
            <ul class="space-y-2">
                <li id="navHome" class="cursor-pointer hover:bg-white/10 p-3 rounded-lg font-semibold transition-all duration-200 flex items-center gap-3">🏠 Home</li>
                <li id="navShared" class="cursor-pointer hover:bg-white/10 p-3 rounded-lg font-semibold transition-all duration-200 flex items-center gap-3">📂 Shared Files</li>
            </ul>
        </div>
        
        <div class="mt-auto p-6">
            <div class="bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20 text-sm text-indigo-100 leading-relaxed shadow-inner">
                <strong class="text-white block mb-1">Why CloudBox?</strong>
                Knowledge is meant to be shared. For the people, by the people.
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-8 relative">
        
        <div class="flex items-center gap-4 mb-8">
            <button id="toggleSidebar" class="bg-white shadow-md text-indigo-600 px-4 py-2 rounded-lg hover:bg-indigo-50 transition-colors font-bold text-lg">☰</button>
            <div>
                <h2 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">Welcome to CloudBox! 🚀</h2>
                <p class="text-sm text-gray-500 font-medium">Don't just store it, share the vibe.</p>
            </div>
        </div>

        <div id="homeSection" class="block animate-fade-in">
            
            <div class="bg-white p-8 rounded-2xl shadow-xl shadow-indigo-100/50 mb-8 border border-gray-100 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                <h3 class="font-bold text-xl mb-6 text-gray-800">Upload a New File</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-600">Select Genre:</label>
                        <select id="genreSelect" class="w-full border-2 border-gray-200 rounded-xl p-3 focus:outline-none focus:border-indigo-500 transition-colors cursor-pointer bg-gray-50 text-gray-700">
                            <option value="Education">Education</option>
                            <option value="Tech">Tech</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Music">Music</option>
                            <option value="Finance">Finance</option>
                            <option value="Projects">Projects</option>
                            <option value="Notes">Notes</option>
                            <option value="Others">Others</option>
                        </select>
                        <input type="text" id="otherGenreInput" class="hidden mt-3 w-full border-2 border-indigo-200 rounded-xl p-3 focus:outline-none focus:border-indigo-500 transition-colors shadow-sm" placeholder="Type your custom genre...">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-600">Choose File:</label>
                        <input type="file" id="fileInput" class="w-full border-2 border-dashed border-indigo-300 rounded-xl p-2.5 cursor-pointer hover:bg-indigo-50 transition-colors file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 text-gray-600"/>
                    </div>
                </div>

                <div class="w-full bg-gray-100 rounded-full h-3 mb-6 hidden overflow-hidden shadow-inner" id="progressContainer">
                    <div class="bg-gradient-to-r from-indigo-500 to-purple-500 h-3 rounded-full transition-all duration-300" id="progressBar" style="width: 0%"></div>
                </div>

                <button id="uploadFile" class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-8 py-3 rounded-xl font-bold hover:shadow-lg hover:-translate-y-0.5 transition-all w-full md:w-auto">Start Upload ☁️</button>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-lg shadow-blue-100/50 border border-gray-100 relative overflow-hidden">
                <div class="absolute left-0 top-0 h-full w-1 bg-blue-400"></div>
                <h3 class="font-bold text-gray-800 mb-4 flex items-center text-lg">
                    <span class="animate-pulse mr-2">🔴</span> Live Activity 
                    <span class="ml-auto text-xs font-bold text-green-700 bg-green-100 px-3 py-1 rounded-full shadow-sm"><span id="activeUsers">1</span> Online</span>
                </h3>
                <ul id="activityFeed" class="text-sm space-y-3 h-40 overflow-y-auto pr-2">
                    <li class="text-gray-400 italic text-center mt-4">Waiting for new uploads to spark...</li>
                </ul>
            </div>
        </div>

        <div id="sharedSection" class="hidden animate-fade-in">
            <div class="bg-white p-8 rounded-2xl shadow-xl shadow-indigo-100/50 border border-gray-100">
                <h3 class="font-bold text-2xl mb-6 text-gray-800 flex items-center gap-2">📂 Community Files</h3>
                
                <div class="flex gap-3 overflow-x-auto mb-8 pb-2 scrollbar-hide" id="filterContainer">
                    <button class="filter-btn px-5 py-2 rounded-full bg-indigo-600 text-white text-sm font-bold shadow-md transition-all hover:-translate-y-0.5" data-filter="All">All Files</button>
                    <button class="filter-btn px-5 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-indigo-100 hover:text-indigo-700 text-sm font-semibold transition-all hover:-translate-y-0.5" data-filter="Education">Education</button>
                    <button class="filter-btn px-5 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-indigo-100 hover:text-indigo-700 text-sm font-semibold transition-all hover:-translate-y-0.5" data-filter="Tech">Tech</button>
                    <button class="filter-btn px-5 py-2 rounded-full bg-gray-100 text-gray-600 hover:bg-indigo-100 hover:text-indigo-700 text-sm font-semibold transition-all hover:-translate-y-0.5" data-filter="Entertainment">Entertainment</button>
                </div>

                <ul id="fileList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </ul>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
